# Local development stack: PostgreSQL + the SoleMate API.
# Usage:
#   cp .env.example .env   (then set JWT_SECRET etc.)
#   docker compose up --build
#
# The api service waits for a healthy database, applies the schema, seeds it,
# then starts. The frontend is run separately with `npm run dev` in /Frontend.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-solemate}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-solemate}
      POSTGRES_DB: ${DB_NAME:-solemate}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-solemate}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-solemate}
      DB_PASSWORD: ${DB_PASSWORD:-solemate}
      DB_NAME: ${DB_NAME:-solemate}
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret-change-me}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      API_KEY: ${API_KEY:-}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run db:seed && npm start"

volumes:
  pgdata:
