AWSTemplateFormatVersion: "2010-09-09"
Description: >
  SoleMate - Frontend stack. Private S3 bucket holding the React build, served
  through CloudFront via Origin Access Control. CloudFront also forwards /api/*
  to the backend ALB so the SPA and API share one origin. Depends on backend stack.

Parameters:
  ProjectName:
    Type: String
    Default: solemate

Resources:
  SpaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        # SPA routing: send 403/404 back to index.html so client-side routes work.
        CustomErrorResponses:
          - { ErrorCode: 403, ResponseCode: 200, ResponsePagePath: /index.html }
          - { ErrorCode: 404, ResponseCode: 200, ResponsePagePath: /index.html }
        Origins:
          - Id: s3-spa
            DomainName: !GetAtt SpaBucket.RegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig: { OriginAccessIdentity: "" }
          - Id: alb-api
            DomainName: !ImportValue { "Fn::Sub": "${ProjectName}-AlbDns" }
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 80
        DefaultCacheBehavior:
          TargetOriginId: s3-spa
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed-CachingOptimized
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: alb-api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # Managed-CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3 # Managed-AllViewer
        PriceClass: PriceClass_100
        # For a custom domain, add ViewerCertificate (ACM, us-east-1) + Aliases.

  SpaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SpaBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub "${SpaBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

Outputs:
  SpaBucketName:
    Value: !Ref SpaBucket
    Export: { Name: !Sub "${ProjectName}-SpaBucket" }
  DistributionId:
    Value: !Ref Distribution
    Export: { Name: !Sub "${ProjectName}-DistributionId" }
  CloudFrontDomain:
    Value: !GetAtt Distribution.DomainName
    Export: { Name: !Sub "${ProjectName}-CloudFrontDomain" }
